<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-PPA 절감 분석기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --bg:#1a1a1a; --bg2:#212121; --bg3:#2a2a2a; --bg4:#333;
  --border:#3d3d3d; --border2:#4a4a4a;
  --tx1:#ececec; --tx2:#b4b4b4; --tx3:#8a8a8a; --tx4:#5a5a5a;
  --orange:#da7756; --orange-lt:#e8926e; --green:#5da87a;
  --r:10px; --rs:6px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--tx1);font-size:13px}

/* Header */
.hdr{height:54px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 32px;position:sticky;top:0;z-index:100}
.hdr-brand{display:flex;align-items:center;gap:10px}
.hdr-title{font-size:15px;font-weight:600;color:var(--tx1);letter-spacing:-.3px}
.hdr-solar{flex-shrink:0;width:34px;height:34px}
@keyframes hdr-spin{to{transform:rotate(360deg)}}
@keyframes hdr-pulse{0%,100%{opacity:1}50%{opacity:.5}}
.hdr-rays{transform-origin:17px 17px;animation:hdr-spin 10s linear infinite}
.hdr-core{transform-origin:17px 17px;animation:hdr-pulse 3s ease-in-out infinite}

/* Layout */
.main{height:calc(100vh - 54px);display:flex}

/* Left */
.left{flex:0 0 50%;background:#252525;display:flex;flex-direction:column;justify-content:center;padding:56px 64px}
.left-content{position:relative}
.headline{font-size:32px;font-weight:700;line-height:1.22;letter-spacing:-1.2px;color:var(--tx1);margin-bottom:18px}
.headline em{font-style:normal;color:var(--orange)}
.subheadline{font-size:14px;color:var(--tx3);line-height:1.9;max-width:380px}

/* Scene */
.scene{
  margin-top:32px;position:relative;
  width:100%;max-width:480px;height:220px;
  border-radius:12px;overflow:hidden;
  background:#2c2c2c;
}

.sun{
  position:absolute;width:26px;height:26px;border-radius:50%;
  background:radial-gradient(circle at 50% 50%,#fff8d6 0%,#ffe566 35%,#ffb030 66%,transparent 82%);
  box-shadow:0 0 8px 4px rgba(255,185,60,.55),0 0 20px 10px rgba(255,140,0,.24);
  transform:translateX(-50%);
  animation:sun-arc 14s ease-in-out infinite;
}
@keyframes sun-arc{
  0%   {left:5%;  bottom:16px; opacity:.5}
  50%  {left:50%; bottom:148px;opacity:1}
  100% {left:95%; bottom:16px; opacity:.35}
}

/* Right */
.right{flex:0 0 50%;display:flex;align-items:center;justify-content:center;padding:48px 64px;border-left:1px solid var(--border);background:var(--bg2);overflow-y:auto}
.right-inner{width:100%;display:flex;flex-direction:column;gap:14px}

/* Upload */
.upload-box{border:2px dashed var(--border2);border-radius:var(--r);padding:44px 24px;text-align:center;background:var(--bg3);cursor:pointer;transition:all .2s;user-select:none}
.upload-box:hover,.upload-box.drag-over{border-color:var(--orange);background:rgba(218,119,86,.05)}
.upload-box.has-file{border-color:var(--green);background:rgba(93,168,122,.06);border-style:solid}
.upload-icon{color:var(--tx4);margin-bottom:14px}
.upload-label{font-size:14px;font-weight:600;color:var(--tx2);margin-bottom:6px;word-break:break-all}
.upload-hint{font-size:11px;color:var(--tx4);line-height:1.8}
.upload-ext{display:inline-flex;gap:6px;margin-top:14px}
.ext-badge{padding:2px 8px;background:var(--bg4);border:1px solid var(--border2);border-radius:4px;font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--tx4)}

/* Config */
#cfg{flex-direction:column;gap:10px}
.cfg-sep{height:1px;background:var(--border);margin:2px 0}
.cfg-title{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.7px}
.inp-row{display:flex;flex-direction:column;gap:4px}
.inp-row-2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.inp-label{font-size:11px;color:var(--tx3);display:flex;justify-content:space-between;align-items:center}
.inp-auto{font-size:10px;color:var(--green);font-weight:500}
.inp-field{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--rs);color:var(--tx1);font-size:13px;padding:7px 10px;outline:none;font-family:'JetBrains Mono',monospace;width:100%;transition:border-color .15s}
.inp-field:focus{border-color:var(--orange)}
.inp-field::placeholder{color:var(--tx4)}

/* CTA */
.btn-cta{width:100%;height:52px;background:var(--orange);border:none;border-radius:var(--rs);color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:9px;transition:background .18s,transform .1s;letter-spacing:-.2px}
.btn-cta:hover{background:var(--orange-lt)}
.btn-cta:active{transform:scale(.98)}
.btn-cta:disabled{opacity:.55;cursor:not-allowed;pointer-events:none}

/* 샘플 다운로드 */
.sample-row{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:2px}
.sample-divider{flex:1;height:1px;background:var(--border)}
.sample-btn{background:none;border:none;color:var(--tx4);font-size:11px;font-family:inherit;cursor:pointer;display:flex;align-items:center;gap:5px;padding:4px 6px;border-radius:4px;white-space:nowrap;transition:color .15s}
.sample-btn:hover{color:var(--tx2)}

@keyframes spin{to{transform:rotate(360deg)}}

/* Region selector */
.region-sel{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.region-btn{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--rs);color:var(--tx3);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;padding:11px 8px;transition:all .15s;display:flex;flex-direction:column;gap:2px;align-items:center;width:100%}
.region-btn.active{border-color:var(--orange);color:var(--tx1);background:rgba(218,119,86,.08)}
.region-sub{font-size:10px;font-weight:400;color:var(--tx4)}
.region-btn.active .region-sub{color:var(--tx3)}

/* Responsive */
@media(max-width:900px){
  .main{flex-direction:column;height:auto;min-height:calc(100vh - 54px)}
  .left{flex:none;width:100%;padding:40px 28px 36px}
  .headline{font-size:28px}
  .scene{height:160px;max-width:100%}
  .right{flex:none;width:100%;padding:32px 24px 40px;border-left:none;border-top:1px solid var(--border);align-items:flex-start}
}
@media(max-width:480px){
  .hdr{padding:0 20px}
  .left{padding:32px 20px 28px}
  .right{padding:28px 20px 36px}
  .headline{font-size:24px}
  .inp-row-2{grid-template-columns:1fr}
}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-brand">
    <svg class="hdr-solar" viewBox="0 0 34 34" fill="none">
      <g class="hdr-rays">
        <line x1="17" y1="1.5"  x2="17" y2="7.5"   stroke="#da7756" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="17" y1="26.5" x2="17" y2="32.5"  stroke="#da7756" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="1.5"  y1="17" x2="7.5"  y2="17"  stroke="#da7756" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="26.5" y1="17" x2="32.5" y2="17"  stroke="#da7756" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="5.7"  y1="5.7"  x2="9.9"  y2="9.9"   stroke="#da7756" stroke-width="1.4" stroke-linecap="round" opacity=".7"/>
        <line x1="24.1" y1="24.1" x2="28.3" y2="28.3"  stroke="#da7756" stroke-width="1.4" stroke-linecap="round" opacity=".7"/>
        <line x1="28.3" y1="5.7"  x2="24.1" y2="9.9"   stroke="#da7756" stroke-width="1.4" stroke-linecap="round" opacity=".7"/>
        <line x1="9.9"  y1="24.1" x2="5.7"  y2="28.3"  stroke="#da7756" stroke-width="1.4" stroke-linecap="round" opacity=".7"/>
      </g>
      <circle class="hdr-core" cx="17" cy="17" r="6.5" fill="#da7756"/>
      <circle cx="17" cy="17" r="4" fill="#e8926e" opacity=".55"/>
    </svg>
    <span class="hdr-title">E-PPA</span>
  </div>
</header>

<main class="main">

  <div class="left">
    <div class="left-content">
      <h1 class="headline">태양광 PPA,<br><em>우리 회사엔 얼마나 이득일까요?</em></h1>
      <p class="subheadline">전력 데이터 하나로 한전 요금 대비 절감액과<br>20년 누적 수익을 즉시 확인하세요</p>
    </div>
    <div class="scene">
      <div class="sun"></div>
      <!-- 반달형 산 능선 하나, 회색에 가까운 초록 -->
      <svg style="position:absolute;bottom:0;left:0;width:100%;height:72%" viewBox="0 0 380 145" preserveAspectRatio="none">
        <path d="M0,145 C50,20 105,20 150,65 C175,88 205,88 235,65 C275,15 330,15 380,145 Z" fill="rgba(92,112,96,0.54)"/>
      </svg>
    </div>
  </div>

  <div class="right">
    <div class="right-inner">

      <div class="upload-box" id="upload-box">
        <input type="file" id="file-input" accept=".xlsx,.xls,.csv" style="display:none">
        <div class="upload-icon">
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
            <rect x="4" y="8" width="32" height="26" rx="3" stroke="currentColor" stroke-width="1.4"/>
            <path d="M4 16h32" stroke="currentColor" stroke-width="1.4"/>
            <path d="M20 22v8M16 25l4-4 4 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="upload-label" id="upload-label">전력 데이터를 넣어보세요</div>
        <div class="upload-hint"  id="upload-hint">드래그 앤 드롭하거나 클릭하여 파일 선택</div>
        <div class="upload-ext">
          <span class="ext-badge">.xlsx</span>
          <span class="ext-badge">.xls</span>
          <span class="ext-badge">.csv</span>
        </div>
      </div>

      <div class="sample-row">
        <div class="sample-divider"></div>
        <button class="sample-btn" onclick="downloadSample()">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 1v7M3 5l3 3 3-3"/><path d="M1 10h10"/>
          </svg>
          AMI 샘플 데이터 (2026, 15분)
        </button>
        <div class="sample-divider"></div>
      </div>

      <div id="cfg" style="display:none">
        <div class="cfg-sep"></div>
        <div class="cfg-title">분석 설정</div>

        <div class="inp-row">
          <div class="inp-label">설치 지역</div>
          <div class="region-sel">
            <button class="region-btn active" id="btn-sudo" onclick="selectRegion('sudo')">
              수도권
              <span class="region-sub">서울·인천·경기</span>
            </button>
            <button class="region-btn" id="btn-nonsudo" onclick="selectRegion('nonsudo')">
              비수도권
              <span class="region-sub">그 외 전국</span>
            </button>
          </div>
        </div>

        <div class="inp-row">
          <div class="inp-label">태양광 설치 용량<span style="font-size:10px;color:var(--tx4)">kWp</span></div>
          <input class="inp-field" id="inp-capacity" type="number" value="300" placeholder="예: 300" min="1" step="0.1">
        </div>

        <div class="inp-row-2">
          <div class="inp-row">
            <div class="inp-label">PPA 단가<span style="font-size:10px;color:var(--tx4)">원/kWh</span></div>
            <input class="inp-field" id="inp-ppa" type="number" value="187" placeholder="예: 187" min="50">
          </div>
          <div class="inp-row">
            <div class="inp-label">현재 한전 평균단가 <span style="font-size:10px;color:var(--tx4)">원/kWh</span><span class="inp-auto" id="tariff-auto"></span></div>
            <input class="inp-field" id="inp-tariff" type="number" placeholder="청구서 기준 자동산출">
          </div>
        </div>

        <div class="cfg-sep"></div>
      </div>

      <button class="btn-cta" id="btn-cta">
        PPA 분석하기
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 8h10M9 4l4 4-4 4"/>
        </svg>
      </button>

    </div>
  </div>

</main>
<script>
/* 재현 가능한 시드 난수 (LCG) — 샘플 파일이 항상 동일하게 생성됨 */
var _seed = 20260101;
function _rand() {
  _seed = (_seed * 1664525 + 1013904223) & 0x7fffffff;
  return _seed / 0x7fffffff;
}

function downloadSample() {
  _seed = 20260101; /* 매 호출마다 시드 초기화 */

  /* 시간대별 기준 부하 (kWh/15min, 300kW급 제조업 기준) */
  var hourBase = [
    20,18,17,16,16,18,   /* 00-05h 심야 최소 */
    28,52,68,74,76,75,   /* 06-11h 오전 부하 상승 */
    72,74,76,74,70,60,   /* 12-17h 오후 피크 */
    44,36,30,26,22,21    /* 18-23h 저녁 감소 */
  ];
  /* 월별 계절 계수 */
  var mFactor = [1.05,0.98,0.90,0.86,0.91,1.08,1.30,1.34,1.08,0.91,0.98,1.06];
  /* 요일 계수 (0=일 1=월 ... 6=토) */
  var dowFactor = [0.38,1.00,1.00,1.00,1.00,0.94,0.40];

  /* 1행 헤더: 날짜 | 00:15 | 00:30 | … | 24:00 | 합계 */
  var header = ['날짜'];
  for (var _h = 0; _h < 24; _h++) {
    for (var _q = 1; _q <= 4; _q++) {
      var _t = _h * 60 + _q * 15;
      header.push(('0'+Math.floor(_t/60)).slice(-2)+':'+('0'+(_t%60)).slice(-2));
    }
  }
  header.push('합계');
  var rows = [header];
  var d = new Date(2026, 0, 1);

  while (d.getFullYear() === 2026) {
    var mo = d.getMonth(), dow = d.getDay();
    var mf = mFactor[mo], df = dowFactor[dow];
    var mm = ('0'+(mo+1)).slice(-2), dd = ('0'+d.getDate()).slice(-2);
    var row = ['2026.'+mm+'.'+dd];
    var dayTotal = 0;

    for (var h = 0; h < 24; h++) {
      for (var q = 0; q < 4; q++) {
        /* ±8% 노이즈 + 피크 구간 소폭 추가 변동 */
        var noise = 1 + (_rand()*0.16 - 0.08);
        var val = Math.round(hourBase[h] * mf * df * noise * 10) / 10;
        row.push(val);
        dayTotal += val;
      }
    }
    row.push(Math.round(dayTotal * 10) / 10); /* 일합계 */
    rows.push(row);
    d.setDate(d.getDate() + 1);
  }

  var ws = XLSX.utils.aoa_to_sheet(rows);
  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'AMI');
  XLSX.writeFile(wb, 'EPPA_AMI샘플데이터_2026.xlsx');
}
</script>
<script src="app.js"></script>
</body>
</html>
